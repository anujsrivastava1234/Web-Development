    <!--Ordered List-->
    <ol type="1">
      <li>Coffee</li>
      <li>Tea</li>
      <li>Milk</li>
    </ol>

    <ol type="A">
      <li>Coffee</li>
      <li>Tea</li>
      <li>Milk</li>
    </ol>

    <ol type="a">
      <li>Coffee</li>
      <li>Tea</li>
      <li>Milk</li>
    </ol>

    <ol type="I">
      <li>Coffee</li>
      <li>Tea</li>
      <li>Milk</li>
    </ol>

    <ol type="i">
      <li>Coffee</li>
      <li>Tea</li>
      <li>Milk</li>
    </ol>

    <!--When starting from index from number other than 1-->
    <ol start="4">
      <li>Coffee</li>
      <li>Tea</li>
      <li>Milk</li>
    </ol>

    <!--Nested List-->
    <ol type="1">
      <li>Coffee</li>
      <ol>
        <li>Black Coffee</li>
        <li>Cold Coffee</li>
      </ol>
      <li>Tea</li>
