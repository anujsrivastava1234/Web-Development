<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Web Desing</title>
  </head>
  <!--Set the background color for a page to powderblue:-->
  <body style="background-color: powderblue">
    <!--Set background color for two different elements:-->
    <h1 style="background-color: pink">This is a heading</h1>
    <h2 style="background-color: green">This is a paragraph</h2>

    <!--For setting colors for the text-->
    <h1 style="color: aqua">This is a heading.</h1>
    <p style="color: pink">This is paragraph.</p>

    <!--For setting fonts-->
    <h1 style="font-family: Kdam Thmor Pro">My name is Anuj.</h1>
    <p style="font-family: Open Sans">This is another paragraph.</p>

    <!--For Text-Size-->
    <h1 style="font-size: 100%">This is another heading.</h1>
    <p style="font-size: 100%">This is another paragraph.</p>

    <!--For text Alignment-->
    <h1 style="text-align: center">This is another heading.</h1>
    <p style="text-align: center">This is another paragraph.</p>
  </body>
</html>
