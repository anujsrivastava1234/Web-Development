<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Css Styling in HTML</title>
  </head>
  <!--Internal Css-->
  <style>
    body {
      background-color: aquamarine;
    }
    h1 {
      color: black;
    }
    p {
      color: chocolate;
    }
  </style>
  <body>
    <!-- Inline CSS
    <h1 style="color: red">This is a Heading.</h1>
    <h2 style="color: aqua">This is a second heading.</h2> -->
    <h1>This is another heading.</h1>
    <p style="font-size: 120%">This is another paragraph.</p>
  </body>
</html>
