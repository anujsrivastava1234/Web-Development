<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tables of webpage</title>
    <!--Border properties-->
    <style>
      table,
      th,
      td {
        border: 1px solid black;
        border-collapse: collapse;
        border-radius: 10px;
        border-style: dashed;
        border-color: aqua;
        text-align: center;
        padding-left: 10px;
        padding-right: 20px;
        padding-top: 30px;
        padding-bottom: 40px;
        border-spacing: 20px;
      }
    </style>
  </head>
  <body>
    <!--table width-->
    <table style="width: 100%">
      <!--Table Row-->
      <tr>
        <!--Table Heading-->
        <th style="width: 50%">Name</th>
        <th colspan="2">Class</th>
        <th>Degree</th>
        <th>Age</th>
        <th>percentage</th>
      </tr>
      <tr>
        <td>A</td>
        <!--Table Data-->
        <td>5-E</td>
        <td>5</td>
        <td>20</td>
        <td>90</td>
      </tr>
      <tr>
        <td>B</td>
        <td>5-D</td>
        <td>5</td>
        <td>30</td>
        <td>100</td>
      </tr>
      <tr>
        <td>A</td>
        <td>5-E</td>
        <td>5</td>
        <td>20</td>
        <td>90</td>
      </tr>
      <tr>
        <td>A</td>
        <td>5-E</td>
        <td>5</td>
        <td>20</td>
        <td>90</td>
      </tr>
      <tr>
        <td>B</td>
        <td>5-D</td>
        <td>5</td>
        <td>30</td>
        <td>100</td>
      </tr>
      <caption>
        Class Records
      </caption>
    </table>
  </body>
</html>
